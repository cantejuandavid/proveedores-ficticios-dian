name: Actualizar proveedores ficticios DIAN

on:
  schedule:
    # Lunes y jueves 6:00 a.m. hora Colombia (UTC-5) => 11:00 UTC
    - cron: "0 11 * * 1,4"
  workflow_dispatch: {}

# Permite al GITHUB_TOKEN hacer commit/push de los archivos generados.
permissions:
  contents: write

concurrency:
  group: actualizar-dian
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cachear navegador de Playwright (Chromium)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependencias del sistema para Chromium
        run: python -m playwright install-deps chromium

      - name: Instalar Chromium (omite la descarga si está en caché)
        run: python -m playwright install chromium

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proveedores_ficticios.csv proveedores_ficticios.json meta.json \
                  contadores_sancionados.csv contadores_sancionados.json contadores_sancionados.meta.json \
                  autorretenedores_renta.csv autorretenedores_renta.json autorretenedores_renta.meta.json
          if git diff --staged --quiet; then
            echo "Sin cambios: nada que commitear."
          else
            git commit -m "Actualizar proveedores ficticios DIAN ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
